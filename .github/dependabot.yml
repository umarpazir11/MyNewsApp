version: 2
updates:
  # Android/Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # GitHub Actions (if you use any)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"